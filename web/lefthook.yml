pre-commit:
  parallel: false
  commands:
    lint:
      glob: '*.{js,jsx,ts,tsx}'
      run: npx oxlint --fix --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    fmt:
      glob: '*'
      run: npx oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
